[build]
  command = "npm run build"
  publish = "out"
  ignore = "git diff --quiet HEAD^ HEAD -- . ':!scripts/.published.json'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/prototypes*"
  [headers.values]
    X-Robots-Tag = "noindex"